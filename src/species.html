<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FishID — Species List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f3;
      --color-bg-tertiary: #eeede8;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #185fa5;
      --color-border: rgba(0,0,0,0.12);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1e1e1c;
        --color-bg-secondary: #2a2a28;
        --color-bg-tertiary: #333330;
        --color-text-primary: #f0efea;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-info: #85b7eb;
        --color-border: rgba(255,255,255,0.12);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
    .back-link {
      font-size: 13px;
      color: var(--color-text-info);
      text-decoration: none;
      white-space: nowrap;
      padding-top: 4px;
    }
    .back-link:hover { text-decoration: underline; }
    .search-input {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--color-text-info); }
    .count {
      font-size: 13px;
      color: var(--color-text-tertiary);
      margin-bottom: 1.25rem;
    }
    .species-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .species-card {
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
      cursor: default;
    }
    .species-card:hover {
      transform: translateY(-2px);
      border-color: var(--color-text-info);
    }
    .species-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
      background: var(--color-bg-tertiary);
    }
    .species-img-placeholder {
      width: 100%;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: var(--color-bg-tertiary);
      color: var(--color-text-tertiary);
    }
    .species-info { padding: 10px 12px; }
    .species-common {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.3;
    }
    .species-scientific {
      font-size: 11px;
      color: var(--color-text-tertiary);
      font-style: italic;
      margin-top: 3px;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--color-text-secondary);
      font-size: 14px;
    }
    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--color-text-tertiary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🐟 FishID — Species List</h1>
        <p>All species the model can identify</p>
      </div>
      <a href="/" class="back-link">← Back to FishID</a>
    </div>

    <input
      type="text"
      class="search-input"
      id="search"
      placeholder="Search by common or scientific name..."
      autocomplete="off"
    >
    <p class="count" id="count">Loading...</p>
    <div class="species-grid" id="species-grid">
      <div class="loading">Loading species...</div>
    </div>
  </div>

  <script>
    const API = '';
    let allSpecies = [];

    fetch(`${API}/species-photos`)
      .then(r => r.json())
      .then(data => {
        allSpecies = Object.values(data).sort((a, b) =>
          a.common.localeCompare(b.common)
        );
        document.getElementById('count').textContent = `${allSpecies.length} species supported`;
        renderSpecies(allSpecies);
      })
      .catch(() => {
        document.getElementById('species-grid').innerHTML =
          '<div class="loading">Failed to load species list.</div>';
      });

    function renderSpecies(species) {
      const grid = document.getElementById('species-grid');
      document.getElementById('count').textContent = `${species.length} species`;

      if (species.length === 0) {
        grid.innerHTML = '<div class="no-results">No species found.</div>';
        return;
      }

      grid.innerHTML = species.map(s => `
        <div class="species-card">
          ${s.photo_url
            ? `<img
                src="${s.photo_url}"
                alt="${s.common}"
                class="species-img"
                loading="lazy"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
               <div class="species-img-placeholder" style="display:none">🐟</div>`
            : `<div class="species-img-placeholder">🐟</div>`
          }
          <div class="species-info">
            <div class="species-common">${s.common}</div>
            <div class="species-scientific">${s.scientific}</div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        renderSpecies(allSpecies);
        return;
      }
      const filtered = allSpecies.filter(s =>
        s.common.toLowerCase().includes(q) ||
        s.scientific.toLowerCase().includes(q)
      );
      renderSpecies(filtered);
    });
  </script>
</body>
</html>
