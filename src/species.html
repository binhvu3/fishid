<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FishID — Species List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f3;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #185fa5;
      --color-border: rgba(0,0,0,0.12);
      --radius-md: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1e1e1c;
        --color-bg-secondary: #2a2a28;
        --color-text-primary: #f0efea;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-info: #85b7eb;
        --color-border: rgba(255,255,255,0.12);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--color-bg); color: var(--color-text-primary); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 860px; margin: 0 auto; }
    .header { margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
    .back-link { font-size: 13px; color: var(--color-text-info); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .search-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 0.5px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg-secondary); color: var(--color-text-primary); margin-bottom: 1.5rem; outline: none; }
    .search-input:focus { border-color: var(--color-text-info); }
    .count { font-size: 13px; color: var(--color-text-tertiary); margin-bottom: 1rem; }
    .species-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
    .species-card { background: var(--color-bg-secondary); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 10px 14px; }
    .species-common { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
    .species-scientific { font-size: 12px; color: var(--color-text-tertiary); font-style: italic; margin-top: 2px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🐟 FishID — Species List</h1>
        <p>All species the model can identify</p>
      </div>
      <a href="/" class="back-link">← Back to FishID</a>
    </div>

    <input type="text" class="search-input" id="search" placeholder="Search by common or scientific name...">
    <p class="count" id="count"></p>
    <div class="species-grid" id="species-grid"></div>
  </div>

  <script>
    const API = '';
    let allSpecies = [];

    fetch(`${API}/species`)
      .then(r => r.json())
      .then(data => {
        allSpecies = data.species;
        document.getElementById('count').textContent = `${data.total} species supported`;
        renderSpecies(allSpecies);
      });

    function renderSpecies(species) {
      const grid = document.getElementById('species-grid');
      grid.innerHTML = species.map(s => `
        <div class="species-card">
          <div class="species-common">${s.common}</div>
          <div class="species-scientific">${s.scientific.replace(/_/g, ' ')}</div>
        </div>
      `).join('');
      document.getElementById('count').textContent = `${species.length} species`;
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = allSpecies.filter(s =>
        s.common.toLowerCase().includes(q) ||
        s.scientific.toLowerCase().includes(q)
      );
      renderSpecies(filtered);
    });
  </script>
</body>
</html>
